<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoEditor</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="o-app">
    <div class="c-property-bar" id="propertyBar">
      <div class="c-property-bar__group" id="toolOptions">
        <label class="c-property-bar__label" for="startTime">开始</label>
        <input class="c-property-bar__input" id="startTime" type="number" min="0" step="0.1" value="0" disabled>
        <label class="c-property-bar__label" for="endTime">结束</label>
        <input class="c-property-bar__input" id="endTime" type="number" min="0" step="0.1" value="0" disabled>
        <label class="c-property-bar__label" for="toolColor">颜色</label>
        <input id="toolColor" type="color" value="#198cff" disabled>
        <label class="c-property-bar__label" for="toolSize">大小</label>
        <input class="c-property-bar__input" id="toolSize" type="number" min="1" max="80" value="8" disabled>
      </div>
      <div class="c-property-bar__group" id="toolSpecificOptions"></div>
      <div class="c-property-bar__divider"></div>
      <div class="c-property-bar__group">
        <button class="c-property-bar__btn" id="btnUndo" title="撤销 (Ctrl+Z)" aria-label="撤销" disabled>
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10h10a5 5 0 0 1 0 10H9"/>
            <path d="M3 10l4-4M3 10l4 4"/>
          </svg>
        </button>
        <button class="c-property-bar__btn" id="btnRedo" title="重做 (Ctrl+Y)" aria-label="重做" disabled>
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10H11a5 5 0 0 0 0 10h4"/>
            <path d="M21 10l-4-4M21 10l-4 4"/>
          </svg>
        </button>
      </div>
      <div class="c-property-bar__spacer"></div>
      <div class="c-property-bar__group">
        <button class="c-property-bar__btn" id="btnOpen" title="打开视频" aria-label="打开视频">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 15v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/>
            <path d="M17 8l-5-5-5 5"/>
            <path d="M12 3v12"/>
          </svg>
        </button>
        <select id="exportFormat" class="c-property-bar__select" aria-label="输出格式" disabled>
          <option value="video/mp4">MP4</option>
          <option value="video/webm">WebM</option>
        </select>
        <button class="c-property-bar__primary" id="btnExport" aria-label="导出视频" disabled>导出</button>
      </div>
    </div>

    <div class="o-app__body">
      <div class="c-toolbar" id="toolbar">
        <button class="c-toolbar__toggle" id="btnToolbarToggle" title="展开工具栏" aria-label="展开工具栏">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
        <div class="c-toolbar__separator"></div>
        <button class="c-toolbar__btn is-active" data-tool="crop" data-tooltip="裁剪" aria-label="裁剪工具">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2v14a2 2 0 0 0 2 2h14"/>
            <path d="M18 22V8a2 2 0 0 0-2-2H2"/>
          </svg>
          <span class="c-toolbar__label">裁剪</span>
        </button>
        <button class="c-toolbar__btn" data-tool="brush" data-tooltip="画笔" aria-label="画笔工具">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="M2 2l7.586 7.586"/>
            <circle cx="11" cy="11" r="2"/>
          </svg>
          <span class="c-toolbar__label">画笔</span>
        </button>
        <button class="c-toolbar__btn" data-tool="text" data-tooltip="文字" aria-label="文字工具">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7V4h16v3"/>
            <path d="M12 4v16"/>
            <path d="M8 20h8"/>
          </svg>
          <span class="c-toolbar__label">文字</span>
        </button>
        <button class="c-toolbar__btn" data-tool="mosaic" data-tooltip="马赛克" aria-label="马赛克工具">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span class="c-toolbar__label">马赛克</span>
        </button>
        <button class="c-toolbar__btn" data-tool="shape" data-tooltip="形状" aria-label="形状工具">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M8 16l4-8 4 8"/>
          </svg>
          <span class="c-toolbar__label">形状</span>
        </button>
        <button class="c-toolbar__btn" data-tool="filter" data-tooltip="滤镜" aria-label="滤镜工具">
          <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2a10 10 0 0 1 0 20"/>
            <path d="M12 2a10 10 0 0 0 0 20"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
          </svg>
          <span class="c-toolbar__label">滤镜</span>
        </button>
      </div>

      <main class="o-app__main">
        <section class="c-preview" id="previewArea">
          <div class="c-preview__stage" id="previewStage">
            <video id="videoPreview" class="c-preview__video" playsinline></video>
            <canvas id="overlayCanvas" class="c-preview__canvas"></canvas>
            <div class="c-preview__placeholder" id="placeholder">
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="5" width="18" height="14" rx="2"/>
                <path d="M10 9l5 3-5 3V9z"/>
              </svg>
              <span>拖拽视频到此处 或 点击“打开”按钮</span>
              <small>所有编辑在浏览器本地完成</small>
            </div>
          </div>
        </section>

        <section class="c-timeline" id="timeline">
          <div class="c-timeline__controls">
            <button class="c-timeline__btn" id="btnPlay" title="播放/暂停" aria-label="播放或暂停视频" disabled>
              <svg aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <span class="c-timeline__time" id="currentTime">00:00.0</span>
            <span class="c-timeline__divider">/</span>
            <span class="c-timeline__time" id="duration">00:00.0</span>
          </div>
          <div class="c-timeline__track" id="timelineTrack">
            <div class="c-timeline__selection" id="timelineSelection"></div>
            <div class="c-timeline__playhead" id="timelinePlayhead"></div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div class="c-toast" id="toast"></div>

  <div class="c-modal u-hidden" id="progressModal" role="dialog" aria-modal="true" aria-labelledby="progressTitle">
    <div class="c-modal__panel">
      <h2 class="c-modal__title" id="progressTitle">正在处理视频</h2>
      <div class="c-modal__progress">
        <div class="c-modal__progress-bar" id="progressBar"></div>
      </div>
      <p class="c-modal__message" id="progressMessage">准备中...</p>
    </div>
  </div>

  <input type="file" id="fileInput" accept="video/mp4,video/webm,video/quicktime" class="u-hidden">

  <script type="module" src="js/main.js"></script>
  <script src="/shared-nav.js"></script>
</body>
</html>
