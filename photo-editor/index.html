<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhotoEditor</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/main.css">
  
</head>
<body>
  <div class="o-app">
    <!-- 顶部属性栏 -->
    <div class="c-property-bar" id="propertyBar">
      <div class="c-property-bar__group" id="toolOptions">
        <!-- 工具参数由 JS 动态填充 -->
      </div>
      <div class="c-property-bar__group">
        <button class="c-property-bar__btn" id="btnRotate" title="逆时针旋转" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9"/>
            <path d="M3 3v6h6"/>
          </svg>
        </button>
      </div>
      <div class="c-property-bar__divider"></div>
      <div class="c-property-bar__spacer"></div>
      <div class="c-property-bar__group">
        <button class="c-property-bar__btn" id="btnUndo" title="撤销 (Ctrl+Z)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 10h10a5 5 0 0 1 0 10H9"/>
            <path d="M3 10l4-4M3 10l4 4"/>
          </svg>
        </button>
        <button class="c-property-bar__btn" id="btnRedo" title="重做 (Ctrl+Y)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10H11a5 5 0 0 0 0 10h4"/>
            <path d="M21 10l-4-4M21 10l-4 4"/>
          </svg>
        </button>
        <button class="c-property-bar__btn" id="btnOpen" title="打开图片">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 15v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/>
            <path d="M17 8l-5-5-5 5"/>
            <path d="M12 3v12"/>
          </svg>
        </button>
        <select id="downloadFormat" class="c-property-bar__select" disabled>
          <option value="">原始格式</option>
          <option value="image/png">PNG</option>
          <option value="image/jpeg">JPG</option>
          <option value="image/webp">WebP</option>
        </select>
        <button class="c-property-bar__btn" id="btnDownload" title="下载 (Ctrl+S)" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 15v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-4"/>
            <path d="M7 10l5 5 5-5"/>
            <path d="M12 15V3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="o-app__body">
      <!-- 左侧工具栏 -->
      <div class="c-toolbar" id="toolbar">
        <button class="c-toolbar__toggle" id="btnToolbarToggle" title="展开工具栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
        <div class="c-toolbar__separator"></div>
        <button class="c-toolbar__btn is-active" data-tool="crop" data-tooltip="裁剪">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2v14a2 2 0 0 0 2 2h14"/>
            <path d="M18 22V8a2 2 0 0 0-2-2H2"/>
          </svg>
          <span class="c-toolbar__label">裁剪</span>
        </button>
        <button class="c-toolbar__btn" data-tool="brush" data-tooltip="画笔">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="M2 2l7.586 7.586"/>
            <circle cx="11" cy="11" r="2"/>
          </svg>
          <span class="c-toolbar__label">画笔</span>
        </button>
        <button class="c-toolbar__btn" data-tool="text" data-tooltip="文字">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M4 7V4h16v3"/>
            <path d="M12 4v16"/>
            <path d="M8 20h8"/>
          </svg>
          <span class="c-toolbar__label">文字</span>
        </button>
        <button class="c-toolbar__btn" data-tool="mosaic" data-tooltip="马赛克">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span class="c-toolbar__label">马赛克</span>
        </button>
        <button class="c-toolbar__btn" data-tool="shape" data-tooltip="形状">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M8 16l4-8 4 8"/>
          </svg>
          <span class="c-toolbar__label">形状</span>
        </button>
        <div class="c-toolbar__separator"></div>
        <button class="c-toolbar__btn" data-tool="filter" data-tooltip="滤镜">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 2a10 10 0 0 1 0 20"/>
            <path d="M12 2a10 10 0 0 0 0 20"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
          </svg>
          <span class="c-toolbar__label">滤镜</span>
        </button>
      </div>

      <!-- 画布区域 -->
      <div class="o-app__main" id="canvasWrapper">
        <div class="c-canvas-area" id="canvasArea">
          <canvas id="mainCanvas" class="c-canvas-area__canvas"></canvas>
          <canvas id="overlayCanvas" class="c-canvas-area__overlay"></canvas>
        </div>
        <div class="c-canvas-area__placeholder" id="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <span>拖拽图片到此处 或 点击"打开"按钮</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="c-toast" id="toast"></div>

  <!-- 隐藏文件输入 -->
  <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" class="u-visually-hidden">

  <script type="module" src="js/main.js"></script>
<script src="/shared-nav.js"></script>
</body>
</html>
