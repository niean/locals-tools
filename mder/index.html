<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD文件渲染工具</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Cdefs%3E%3ClinearGradient id='grad' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%23667eea;stop-opacity:1'/%3E%3Cstop offset='100%25' style='stop-color:%23764ba2;stop-opacity:1'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='100' rx='12' fill='url(%23grad)'/%3E%3Cpath d='M30 25 L30 75 L70 75 L70 40 L55 40 L55 25 Z' fill='white' opacity='0.9'/%3E%3Cpath d='M55 25 L70 40 L55 40 Z' fill='white' opacity='0.7'/%3E%3Cpath d='M35 45 L65 45 M35 55 L65 55 M35 65 L50 65' stroke='%23667eea' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
    <script src="lib/marked.min.js"></script>
    <script src="lib/highlight.min.js"></script>
    <link rel="stylesheet" href="lib/github.min.css">
    <style>
        /* ==========================================================================
           Generic - Reset
           ========================================================================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ==========================================================================
           Elements - Base element styles
           ========================================================================== */

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* ==========================================================================
           Components - Container
           ========================================================================== */

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 40px);
        }

        /* ==========================================================================
           Components - Header
           ========================================================================== */

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header__content {
            flex: 1;
        }

        .header__title {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .header__subtitle {
            opacity: 0.9;
            font-size: 0.9em;
        }

        .header__actions {
            display: flex;
            gap: 10px;
        }

        .header__action-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .header__action-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .header__title {
                font-size: 1.5em;
            }
        }

        /* ==========================================================================
           Components - Output Section
           ========================================================================== */

        .output-section {
            position: relative;
            padding: 30px;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .output-header__title {
            color: #495057;
            font-size: 1.5em;
            word-break: break-all;
        }

        @media (max-width: 768px) {
            .output-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }

        /* ==========================================================================
           Components - Markdown Content
           marked.js generates raw HTML without custom classes,
           so descendant selectors are intentionally used here.
           ========================================================================== */

        .markdown-content {
            flex: 1;
            line-height: 1.8;
            color: #212529;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: #212529;
        }

        .markdown-content h1 {
            font-size: 2em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }

        .markdown-content h2 {
            font-size: 1.5em;
            border-bottom: 1px solid #eaecef;
            padding-bottom: 0.3em;
        }

        .markdown-content h3 {
            font-size: 1.25em;
        }

        .markdown-content p {
            margin-bottom: 16px;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 16px;
            padding-left: 2em;
        }

        .markdown-content li {
            margin-bottom: 0.25em;
        }

        .markdown-content blockquote {
            padding: 0 1em;
            color: #6a737d;
            border-left: 0.25em solid #dfe2e5;
            margin-bottom: 16px;
        }

        .markdown-content code {
            padding: 0.2em 0.4em;
            margin: 0;
            font-size: 85%;
            background-color: rgba(27, 31, 35, 0.05);
            border-radius: 3px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        }

        .markdown-content pre {
            padding: 16px;
            overflow: auto;
            font-size: 85%;
            line-height: 1.45;
            background-color: #f6f8fa;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .markdown-content pre code {
            display: inline;
            padding: 0;
            margin: 0;
            overflow: visible;
            line-height: inherit;
            word-wrap: normal;
            background-color: transparent;
            border: 0;
        }

        .markdown-content table {
            border-spacing: 0;
            border-collapse: collapse;
            margin-bottom: 16px;
            width: 100%;
        }

        .markdown-content table th,
        .markdown-content table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }

        .markdown-content table th {
            font-weight: 600;
            background-color: #f6f8fa;
        }

        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            margin: 16px 0;
        }

        .markdown-content a {
            color: #0366d6;
            text-decoration: none;
        }

        .markdown-content a:hover {
            text-decoration: underline;
        }

        .markdown-content hr {
            height: 0.25em;
            padding: 0;
            margin: 24px 0;
            background-color: #e1e4e8;
            border: 0;
        }

        /* ==========================================================================
           Components - Empty State
           ========================================================================== */

        .empty-state {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #6c757d;
            cursor: pointer;
            transition: background-color 0.2s ease;
            border-radius: 8px;
            text-align: center;
        }

        .empty-state:hover {
            background-color: #f8f9fa;
        }

        .empty-state__icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state__text {
            font-size: 18px;
        }

        /* ==========================================================================
           Components - Error Message
           ========================================================================== */

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        /* ==========================================================================
           Components - File Info
           ========================================================================== */

        .file-info {
            color: #6c757d;
            font-size: 14px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
            text-align: right;
        }

        /* ==========================================================================
           Components - Utility
           ========================================================================== */

        .is-hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header__content">
                <h1 class="header__title">MD文件渲染工具</h1>
            </div>
            <div class="header__actions">
                <button class="header__action-btn is-hidden" id="reloadFileBtn">
                    重新加载
                </button>
                <button class="header__action-btn" id="openFileBtn">
                    打开文件
                </button>
            </div>
        </div>

        <input type="file" id="fileInput" class="is-hidden" accept=".md,.markdown,.txt">

        <div class="output-section">
            <div id="errorContainer"></div>
            <div id="markdownOutput" class="markdown-content">
                <div class="empty-state">
                    <div class="empty-state__text">点击此处或右上角的"打开文件"按钮选择 Markdown 文件</div>
                </div>
            </div>
            <div class="file-info" id="fileInfo"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // 文件大小单位常量
        const BYTES_PER_KB = 1024;
        const BYTES_PER_MB = 1024 * 1024;

        // 配置 marked
        marked.setOptions({
            highlight: (code, lang) => {
                if (lang && hljs.getLanguage(lang)) {
                    try {
                        return hljs.highlight(code, { language: lang }).value;
                    } catch (err) {} // 静默处理高亮失败，降级为自动检测
                }
                return hljs.highlightAuto(code).value;
            },
            breaks: true,
            gfm: true,
            html: false,
        });

        // 保存当前文件的句柄和路径信息
        let currentFileHandle = null;
        let currentFilePath = null;
        let currentFileName = null;

        // 显示错误信息
        const showError = (message) => {
            const errorContainer = document.getElementById('errorContainer');
            errorContainer.innerHTML = `<div class="error-message">错误：${message}</div>`;
        };

        // 清除错误信息
        const clearError = () => {
            document.getElementById('errorContainer').innerHTML = '';
        };

        // 显示/隐藏重新加载按钮
        const toggleReloadButton = (show) => {
            const reloadBtn = document.getElementById('reloadFileBtn');
            if (reloadBtn) {
                reloadBtn.classList.toggle('is-hidden', !show);
            }
        };

        // 格式化字节数显示
        const formatBytes = (bytes) => {
            if (bytes < BYTES_PER_KB) return `${bytes} B`;
            if (bytes < BYTES_PER_MB) return `${(bytes / BYTES_PER_KB).toFixed(2)} KB`;
            return `${(bytes / BYTES_PER_MB).toFixed(2)} MB`;
        };

        // 格式化更新时间显示
        const formatDate = (timestamp) => {
            if (!timestamp) return '未知';
            const date = new Date(timestamp);
            const dateStr = date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
            });
            const timeStr = date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
            });
            return `${dateStr} ${timeStr}`;
        };

        // 渲染 Markdown
        const renderMarkdown = (content, filePath, fileName, fileHandle = null, lastModified = null) => {
            try {
                clearError();
                const html = marked.parse(content);
                document.getElementById('markdownOutput').innerHTML = html;

                // 保存文件句柄和路径信息，用于重新加载
                currentFileHandle = fileHandle;
                currentFilePath = filePath;
                currentFileName = fileName;

                // 更新文件信息（包含文件路径、行数、字节数、更新时间）
                const fileInfoEl = document.getElementById('fileInfo');

                if (filePath && content) {
                    const lineCount = content.split('\n').length;
                    const byteCount = new TextEncoder().encode(content).length;
                    const displayPath = filePath || fileName || '未知文件';
                    const updateTime = formatDate(lastModified);

                    if (fileInfoEl) {
                        fileInfoEl.textContent = `文件：${displayPath} | 行数：${lineCount} | 大小：${formatBytes(byteCount)} | 时间：${updateTime}`;
                    }

                    toggleReloadButton(true);
                } else {
                    if (fileInfoEl) {
                        fileInfoEl.textContent = '';
                    }

                    toggleReloadButton(false);
                }
            } catch (error) {
                showError(`渲染 Markdown 时出错：${error.message}`);
            }
        };

        // 读取文件内容
        const readFile = (file, fileHandle = null) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const content = e.target.result;
                const filePath = file.path || file.webkitRelativePath || file.name;
                const lastModified = file.lastModified || null;
                renderMarkdown(content, filePath, file.name, fileHandle, lastModified);
            };
            reader.onerror = () => {
                showError('读取文件失败');
            };
            reader.readAsText(file, 'UTF-8');
        };

        // 重新加载文件
        const reloadFile = async () => {
            if (!currentFileHandle && !currentFilePath) {
                showError('没有可重新加载的文件');
                return;
            }

            try {
                // 如果保存了文件句柄（File System Access API），直接使用它重新读取
                if (currentFileHandle) {
                    const file = await currentFileHandle.getFile();
                    readFile(file, currentFileHandle);
                    return;
                }

                // 如果有文件路径，尝试通过 File System Access API 重新打开
                if (currentFilePath && window.showOpenFilePicker) {
                    try {
                        const [handle] = await window.showOpenFilePicker({
                            types: [{
                                description: 'Markdown 文件',
                                accept: {
                                    'text/markdown': ['.md', '.markdown'],
                                    'text/plain': ['.txt'],
                                },
                            }],
                            excludeAcceptAllOption: false,
                            multiple: false,
                        });

                        const file = await handle.getFile();
                        readFile(file, handle);
                        return;
                    } catch (e) {
                        if (e.name !== 'AbortError') {
                            throw e;
                        }
                        return; // 用户取消
                    }
                }

                // 如果都不行，尝试通过 fetch 重新加载（如果文件在可访问的位置）
                if (currentFilePath) {
                    try {
                        const response = await fetch(currentFilePath);
                        if (response.ok) {
                            const content = await response.text();
                            const lastModifiedHeader = response.headers.get('Last-Modified');
                            const lastModified = lastModifiedHeader ? new Date(lastModifiedHeader).getTime() : null;
                            renderMarkdown(content, currentFilePath, currentFileName, null, lastModified);
                            return;
                        }
                    } catch (e) {
                        console.warn('fetch fallback failed:', e.message);
                        // fetch 失败，继续尝试其他方式
                    }
                }

                // 最后尝试：提示用户重新选择文件
                showError('无法自动重新加载文件，请使用"打开文件"按钮重新选择文件');
            } catch (error) {
                showError(`重新加载文件失败: ${error.message}`);
            }
        };

        // 使用 File System Access API 打开文件
        const openFileWithAPI = async () => {
            if (!window.showOpenFilePicker) {
                console.log('不支持 File System Access API，回退到传统方式');
                document.getElementById('fileInput').click();
                return;
            }

            try {
                const [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'Markdown 文件',
                        accept: {
                            'text/markdown': ['.md', '.markdown'],
                            'text/plain': ['.txt'],
                        },
                    }],
                    excludeAcceptAllOption: false,
                    multiple: false,
                });

                const file = await fileHandle.getFile();
                readFile(file, fileHandle);
            } catch (e) {
                if (e.name !== 'AbortError') {
                    console.error('打开文件失败:', e);
                    showError(`打开文件失败: ${e.message}`);
                }
            }
        };

        // 文件选择（通过 input file）
        const handleFileSelect = (event) => {
            const file = event.target.files[0];
            if (file) {
                if (!file.name.match(/\.(md|markdown|txt)$/i)) {
                    showError('请选择 Markdown 文件（.md, .markdown, .txt）');
                    return;
                }
                readFile(file);
            }
        };

        // 绑定事件监听器
        document.getElementById('reloadFileBtn').addEventListener('click', reloadFile);
        document.getElementById('openFileBtn').addEventListener('click', openFileWithAPI);
        document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        document.querySelector('.empty-state').addEventListener('click', openFileWithAPI);

        })();
    </script>
<script src="/shared-nav.js"></script>
</body>
</html>
