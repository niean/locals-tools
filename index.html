<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本地工具集</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f8ff;
      --card: #ffffff;
      --text: #17324d;
      --muted: #58708a;
      --primary: #198cff;
      --primary-soft: #e8f3ff;
      --border: #d7e7fb;
      --shadow: 0 20px 50px rgba(25, 140, 255, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }

    .hero {
      display: flex;
      gap: 20px;
      align-items: center;
      margin-bottom: 36px;
    }

    .hero__icon {
      width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--primary);
      display: grid;
      place-items: center;
      box-shadow: var(--shadow);
      flex: none;
    }

    .hero__icon svg {
      width: 42px;
      height: 42px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(17, 67, 122, 0.06);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: #b8d7fb;
      box-shadow: 0 14px 36px rgba(17, 67, 122, 0.10);
    }

    .card__label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
      margin-bottom: 14px;
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero__icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" fill="none">
          <path d="M22 24h20a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H22a4 4 0 0 1-4-4V28a4 4 0 0 1 4-4Z" fill="#FFFFFF"/>
          <path d="M26 21h12a3 3 0 0 1 3 3v2H23v-2a3 3 0 0 1 3-3Z" fill="#FFFFFF"/>
          <path d="M43 23l-7 7" stroke="#198CFF" stroke-width="4" stroke-linecap="round"/>
          <path d="M31 28l5 5" stroke="#198CFF" stroke-width="4" stroke-linecap="round"/>
          <circle cx="25" cy="33" r="2.5" fill="#198CFF"/>
        </svg>
      </div>
      <div>
        <h1>本地工具集</h1>
        <p>个人使用的浏览器本地工具入口页。现在根页面已经有独立 favicon，不再显示默认目录列表。</p>
      </div>
    </section>

    <section class="grid">
      <a class="card" href="photo-editor/">
        <span class="card__label">PE</span>
        <h2>Photo Editor</h2>
        <p>本地图片编辑，支持裁剪、标注、马赛克与导出。</p>
      </a>

      <a class="card" href="mder/">
        <span class="card__label">MD</span>
        <h2>MDer</h2>
        <p>Markdown 文件渲染与查看工具。</p>
      </a>

      <a class="card" href="iframer/">
        <span class="card__label">IF</span>
        <h2>Iframer</h2>
        <p>iframe 渲染与调试工具。</p>
      </a>
    </section>
  </main>
</body>
</html>
