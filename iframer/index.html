<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='8' y='8' width='48' height='48' rx='14' fill='%23198CFF'/%3E%3Cpath d='M22 24h20a4 4 0 0 1 4 4v10a4 4 0 0 1-4 4H22a4 4 0 0 1-4-4V28a4 4 0 0 1 4-4Z' fill='%23FFFFFF'/%3E%3Cpath d='M26 21h12a3 3 0 0 1 3 3v2H23v-2a3 3 0 0 1 3-3Z' fill='%23FFFFFF'/%3E%3Cpath d='M43 23l-7 7' stroke='%23198CFF' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M31 28l5 5' stroke='%23198CFF' stroke-width='4' stroke-linecap='round'/%3E%3Ccircle cx='25' cy='33' r='2.5' fill='%23198CFF'/%3E%3C/svg%3E" type="image/svg+xml">
    <title>iframe渲染工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }
        body {
            padding: 10px;
            background: #f3f8ff;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: calc(100vh - 20px);
        }
        .editor, .preview {
            height: 100%;
            background: white;
            border: 1px solid #d7e7fb;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(17, 67, 122, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .editor {
            width: 15%;
            min-width: 200px;
        }
        .preview {
            flex: 1;
            min-width: 200px;
        }
        .title {
            padding: 8px 12px;
            background: #198cff;
            color: white;
            font-size: 14px;
        }
        #code-input {
            flex: 1;
            width: 100%;
            border: none;
            padding: 10px;
            resize: none;
            font-family: monospace;
            font-size: 14px;
        }
        #code-input:focus {
            outline: none;
        }
        #preview-area {
            flex: 1;
            padding: 10px;
            overflow: auto;
            background: #eef5ff;
        }
        #render-result {
            width: 100%;
            height: 100%;
            border: 1px dashed #c1d9f8;
            overflow: auto;
            background: #ffffff;
        }
        .error {
            color: #b42318;
            padding: 8px;
            font-size: 13px;
            background: #fdebec;
            display: none;
        }
        .resizer {
            width: 6px;
            height: 100%;
            background: #d7e7fb;
            cursor: col-resize;
            user-select: none;
            border-left: 1px solid #c1d9f8;
            border-right: 1px solid #c1d9f8;
        }
        .resizer:hover {
            background: #b8d7fb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="editor">
            <div class="title">iframe代码</div>
            <textarea id="code-input" placeholder='示例: <iframe src="https://example.com" width="100%" height="100%"></iframe>'></textarea>
            <div class="error" id="error"></div>
        </div>

        <div class="resizer" id="resizer"></div>

        <div class="preview">
            <div class="title">渲染预览</div>
            <div id="preview-area">
                <div id="render-result"></div>
            </div>
        </div>
    </div>

    <script>
        const codeInput = document.getElementById('code-input');
        const renderResult = document.getElementById('render-result');
        const errorEl = document.getElementById('error');
        const resizer = document.getElementById('resizer');
        const editor = document.querySelector('.editor');
        const container = document.querySelector('.container');

        function render() {
            const code = codeInput.value.trim();
            errorEl.style.display = 'none';
            renderResult.innerHTML = '';

            if (!code) return;

            try {
                const temp = document.createElement('div');
                temp.innerHTML = code;
                const iframe = temp.querySelector('iframe');
                
                if (!iframe) {
                    throw new Error('请输入有效的 iframe 标签');
                }

                // 确保iframe背景与容器协调
                if (!iframe.style.backgroundColor) {
                    iframe.style.backgroundColor = 'transparent';
                }
                if (!iframe.style.height) iframe.height = '100%';
                if (!iframe.style.width) iframe.width = '100%';

                renderResult.appendChild(iframe);
                
                iframe.onerror = () => {
                    throw new Error('加载失败（可能存在跨域限制）');
                };
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
            }
        }

        function initResizer() {
            let startX, startWidth;

            resizer.addEventListener('mousedown', (e) => {
                startX = e.pageX;
                startWidth = editor.offsetWidth;
                document.addEventListener('mousemove', resize);
                document.addEventListener('mouseup', stopResize);
                resizer.style.background = '#8fc2ff';
            });

            function resize(e) {
                const width = startWidth + (e.pageX - startX);
                if (width >= 200 && (container.offsetWidth - width) >= 200) {
                    editor.style.width = `${width}px`;
                }
            }

            function stopResize() {
                document.removeEventListener('mousemove', resize);
                document.removeEventListener('mouseup', stopResize);
                resizer.style.background = '#d7e7fb';
            }
        }

        codeInput.addEventListener('input', render);
        window.addEventListener('load', () => {
            render();
            initResizer();
        });
    </script>
</body>
</html>
